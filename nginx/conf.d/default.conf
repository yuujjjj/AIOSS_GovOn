# GovOn Blue/Green Upstream Configuration
# Update the active upstream to switch between blue and green deployments
#
# Blue 활성:  server govon-blue:8000 주석 해제
# Green 활성: server govon-green:8000 주석 해제
# 트래픽 전환 시 하나만 활성화하고 nginx reload 실행:
#   docker exec govon-nginx nginx -s reload

upstream govon_active {
    # Blue deployment (default active)
    server govon-blue:8000;
    # Green deployment (uncomment to switch)
    # server govon-green:8000;
}

server {
    listen 80;
    server_name _;

    # Request size limit for complaint submissions
    client_max_body_size 10m;

    location / {
        proxy_pass http://govon_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # vLLM inference can take time for long responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location /health {
        proxy_pass http://govon_active/health;
        proxy_read_timeout 5s;

        # Allow frequent health checks without rate limiting
        access_log off;
    }
}
