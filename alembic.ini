# Alembic 설정 파일
# GovOn RAG 데이터베이스 마이그레이션

[alembic]
# 마이그레이션 스크립트 경로
script_location = src/inference/db/alembic

# 마이그레이션 파일명 템플릿
file_template = %%(rev)s_%%(slug)s

# 타임존 설정
timezone = UTC

# sqlalchemy.url은 env.py에서 환경변수로 설정
# sqlalchemy.url = postgresql://govon:govon@localhost:5432/govon

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
