# 볼륨 마운트 안내:
# ./models → /app/models (faiss_index, bm25_index 등 모든 모델 데이터 포함)
# ./data   → /app/data   (학습/테스트 데이터)

services:
  govon-backend:
    image: ${GOVON_IMAGE:-ghcr.io/govon-org/govon:latest}
    container_name: ${GOVON_CONTAINER_NAME:-govon-backend}
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./agents:/app/agents
      - ./configs:/app/configs
      - ./logs:/var/log/govon
      - ./.cache:/app/.cache
    environment:
      SERVING_PROFILE: ${SERVING_PROFILE:-airgap}
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RELOAD: "false"
      API_KEY: ${API_KEY:?Set API_KEY in .env before starting offline runtime}
      MODEL_PATH: ${MODEL_PATH:-/app/models/GovOn-EXAONE-AWQ-v2}
      TRUST_REMOTE_CODE: ${TRUST_REMOTE_CODE:-true}
      MODEL_DTYPE: ${MODEL_DTYPE:-half}
      ENFORCE_EAGER: ${ENFORCE_EAGER:-true}
      DATA_PATH: ${DATA_PATH:-/app/data/processed/v2_train.jsonl}
      INDEX_PATH: ${INDEX_PATH:-/app/models/faiss_index/complaints.index}
      FAISS_INDEX_DIR: ${FAISS_INDEX_DIR:-/app/models/faiss_index}
      BM25_INDEX_DIR: ${BM25_INDEX_DIR:-/app/models/bm25_index}
      AGENTS_DIR: ${AGENTS_DIR:-/app/agents}
      LOG_DIR: ${LOG_DIR:-/var/log/govon}
      CACHE_DIR: ${CACHE_DIR:-/app/.cache}
      GPU_UTILIZATION: ${GPU_UTILIZATION:-0.8}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-8192}
      SKIP_MODEL_LOAD: ${SKIP_MODEL_LOAD:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      REQUEST_TIMEOUT_SEC: ${REQUEST_TIMEOUT_SEC:-90}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://10.0.0.100:3000}
      BM25_INDEX_HMAC_KEY: ${BM25_INDEX_HMAC_KEY:?Set BM25_INDEX_HMAC_KEY in .env before starting offline runtime}
      DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY:-}
      USE_RAG_PIPELINE: ${USE_RAG_PIPELINE:-true}
      MODEL_VERSION: ${MODEL_VERSION:-v2_lora}
      LANGGRAPH_MODEL_BASE_URL: ${LANGGRAPH_MODEL_BASE_URL:-http://127.0.0.1:8001/v1}
      LANGGRAPH_MODEL_API_KEY: ${LANGGRAPH_MODEL_API_KEY:-EMPTY}
      HEALTH_INTERVAL_SEC: ${HEALTH_INTERVAL_SEC:-30}
      HEALTH_TIMEOUT_SEC: ${HEALTH_TIMEOUT_SEC:-10}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3.10",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
