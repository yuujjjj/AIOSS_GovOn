# 볼륨 마운트 안내:
# ./models → /app/models (faiss_index, bm25_index 등 모든 모델 데이터 포함)
# ./data   → /app/data   (학습/테스트 데이터)

services:
  govon-backend:
    image: ghcr.io/govon-org/govon:latest
    container_name: govon-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./agents:/app/agents
      - ./configs:/app/configs
    environment:
      - SERVING_PROFILE=${SERVING_PROFILE:-container}
      - API_KEY=${API_KEY}
      - MODEL_PATH=${MODEL_PATH:-umyunsang/GovOn-EXAONE-LoRA-v2}
      - GPU_UTILIZATION=0.8
      - MAX_MODEL_LEN=8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3.10",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
