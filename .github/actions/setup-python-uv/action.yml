name: 'Setup Python with uv'
description: 'Install uv, set up Python, and install dependencies'
inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.10'
  uv-cache:
    description: 'Enable uv cache'
    required: false
    default: 'true'
  extras:
    description: 'Extra dependencies to install (e.g., --all-extras or --extra dev)'
    required: false
    default: '--all-extras'
runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: ${{ inputs.uv-cache }}
        cache-dependency-glob: "uv.lock"
    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}
    - name: Install dependencies
      shell: bash
      run: uv sync ${{ inputs.extras }}
