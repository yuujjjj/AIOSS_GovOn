# 파일 경로 기반 자동 라벨 매핑
# actions/labeler@v5 에서 사용

ai-model:
  - changed-files:
    - any-glob-to-any-file:
      - "src/inference/**"
      - "src/utils/**"
      - "inference/**"
      - "models/**"
      - "notebooks/**"
      - "configs/**"
      - "*.ipynb"

backend:
  - changed-files:
    - any-glob-to-any-file:
      - "src/backend/**"
      - "src/api/**"
      - "src/server/**"
      - "**/api/**"
      - "**/server/**"
      - "**/routers/**"
      - "**/*_server.py"
      - "**/*_api.py"
      - "**/main.py"
      - "**/app.py"

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - "frontend/**"
      - "web/**"
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.vue"

data:
  - changed-files:
    - any-glob-to-any-file:
      - "data/**"
      - "src/preprocessing/**"
      - "preprocessing/**"
      - "**/*.csv"
      - "**/*.json"
      - "**/*.jsonl"

preprocessing:
  - changed-files:
    - any-glob-to-any-file:
      - "src/preprocessing/**"
      - "preprocessing/**"

infra:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/**"
      - "Dockerfile"
      - "Dockerfile.*"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - ".dockerignore"
      - "**/*.sh"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**"
      - "**/*.md"
      - "assets/**"
