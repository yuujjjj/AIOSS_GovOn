name: Lean Startup RAG A/B Experiment (GitHub GPU)

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/evaluation/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  experiment:
    name: RAG A/B Comparison Experiment
    runs-on: ubuntu-22.04-gpu-t4
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false

    steps:
      - name: Install Git LFS on Self-hosted Runner
        run: |
          if ! command -v git-lfs &> /dev/null; then
            echo "Git LFS not found. Installing..."
            sudo apt-get update && sudo apt-get install -y git-lfs
            git lfs install
          else
            echo "Git LFS is already installed."
          fi

      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Pull LFS objects
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install Project Dependencies
        run: |
          uv sync --extra dev --extra inference

      - name: Run Lean Startup Experiment
        env:
          MODEL_PATH: "umyunsang/GovOn-EXAONE-LoRA-v2"
          DATA_PATH: "data/processed/v2_test.jsonl"
          GPU_UTILIZATION: "0.7"
          WANDB_MODE: "online"
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: "GovOn"
        run: |
          uv run python -m src.evaluation.lean_experiment \
            --output_dir experiment_results

      - name: Post Experiment Results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'experiment_results/experiment_report.md';
            const body = fs.existsSync(reportPath)
              ? `### Lean Startup RAG A/B 실험 결과 (NVIDIA T4)\n\n${fs.readFileSync(reportPath, 'utf8')}`
              : "### Lean Startup RAG A/B 실험\n\n실험 리포트 생성에 실패했습니다.";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
