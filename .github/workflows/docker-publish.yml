name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-ref.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase image name
        id: lower
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}
          tags: |
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set image reference output
        id: image-ref
        run: echo "image_tag=${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:sha-${{ steps.short-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:sha-${{ steps.short-sha.outputs.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

      - name: Publish summary
        run: |
          echo "### Docker Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.image-ref.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Next Step | Use \\`image_tag=sha-${{ steps.short-sha.outputs.sha }}\\` when manually dispatching Deploy to Cloud Run. |" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image_tag }}"
          echo "image=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Verify image structure
        run: |
          echo "### Docker Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Check Python is available
          if docker run --rm ${{ env.image }} python3.10 --version 2>&1; then
            echo "| Python installed | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Python installed | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check source code exists
          if docker run --rm ${{ env.image }} ls /app/src/inference/api_server.py 2>&1; then
            echo "| Source code present | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Source code present | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check key dependencies (optional — may fail without GPU libs)
          if docker run --rm ${{ env.image }} python3.10 -c "import fastapi; print(f'FastAPI {fastapi.__version__}')" 2>&1; then
            echo "| FastAPI importable | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| FastAPI importable | ⚠️ (optional dep, may require GPU build) |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check working directory
          WORKDIR=$(docker run --rm ${{ env.image }} pwd 2>&1) || true
          echo "| Working directory | ${WORKDIR} |" >> $GITHUB_STEP_SUMMARY

      - name: Container runtime smoke test
        run: |
          HEALTH_RESPONSE="$(bash .github/scripts/smoke_test_container.sh "${{ env.image }}")"
          echo "| Runtime contract | ✅ (/health ready with container profile) |" >> $GITHUB_STEP_SUMMARY
          echo "| Health response | \`${HEALTH_RESPONSE}\` |" >> $GITHUB_STEP_SUMMARY
