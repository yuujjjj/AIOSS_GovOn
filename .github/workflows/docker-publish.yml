name: Docker Publish

on:
  workflow_run:
    workflows: ["PR Gate"]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref or commit SHA to build'
        required: false
        default: 'main'

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.build-metadata.outputs.image_tag }}

    steps:
      - name: Checkout workflow-run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Checkout tag ref
        if: github.event_name == 'push'
        uses: actions/checkout@v6

      - name: Lowercase image name
        id: lower
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Reclaim runner disk space
        run: bash .github/scripts/free_runner_disk_space.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine build metadata
        id: build-metadata
        run: |
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}"
          PRIMARY_TAG="${IMAGE_BASE}:sha-${SHORT_SHA}"
          TAGS="${PRIMARY_TAG}"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_BASE}:latest"
            SOURCE="main branch after PR Gate success"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_BASE}:${GITHUB_REF_NAME}"
            SOURCE="release tag ${GITHUB_REF_NAME}"
          else
            SOURCE="manual dispatch (${GITHUB_EVENT_NAME})"
          fi

          {
            echo "sha=${SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "image_tag=${PRIMARY_TAG}"
            echo "source=${SOURCE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.build-metadata.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-metadata.outputs.image_tag }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

      - name: Publish summary
        run: |
          echo "### Docker Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | ${{ steps.build-metadata.outputs.source }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ steps.build-metadata.outputs.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Primary Image | ${{ steps.build-metadata.outputs.image_tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Flow | Use \`Deploy Demo Runtime to Cloud Run\` manually if demo verification is needed. |" >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image_tag }}"
          echo "image=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Verify image structure
        run: |
          echo "### Docker Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if docker run --rm ${{ env.image }} python3.10 --version 2>&1; then
            echo "| Python installed | yes |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Python installed | no |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if docker run --rm ${{ env.image }} ls /app/src/inference/api_server.py 2>&1; then
            echo "| Runtime source present | yes |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Runtime source present | no |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Container runtime smoke test
        run: |
          HEALTH_RESPONSE="$(bash .github/scripts/smoke_test_container.sh "${{ env.image }}")"
          echo "| Runtime contract | passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health response | \`${HEALTH_RESPONSE}\` |" >> "$GITHUB_STEP_SUMMARY"
