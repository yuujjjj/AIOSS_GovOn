      - name: Comment PR with Live Preview Link
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://govon-org.github.io${process.env.PREVIEW_PATH}/`;

            const body = [
              `### 🚀 PR 실시간 프리뷰 배포 완료`,
              ``,
              `| 항목 | 상세 정보 |`,
              `|------|-------|`,
              `| **Preview URL** | [**여기서 확인하기**](${previewUrl}) |`,
              `| **배포 경로** | \`${process.env.PREVIEW_PATH}\` |`,
              `| **빌드 상태** | ✅ 성공 |`,
              `| **브랜치** | \`${context.payload.pull_request.head.ref}\` |`,
              ``,
              `> ⚠️ 정적 자원(JS, CSS)이 로드되지 않을 경우 페이지를 새로고침해 주세요.`,
              `> 머지 또는 PR 종료 시 이 프리뷰 폴더는 자동으로 삭제됩니다.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('🚀 PR 실시간 프리뷰 배포 완료')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }
