name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_BUILD_VERSION: "3.11"
  NODE_BUILD_VERSION: "20"

jobs:
  detect-projects:
    name: Detect Projects
    runs-on: ubuntu-latest
    outputs:
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect optional frontend project
        id: detect
        run: |
          if [ -f "GovOn/frontend/package-lock.json" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    needs: detect-projects
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BUILD_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run Black
        run: black --check src/data_collection_preprocessing tests/test_data_collection_preprocessing

      - name: Run isort
        run: isort --check-only src/data_collection_preprocessing tests/test_data_collection_preprocessing

      - name: Run Flake8
        run: |
          flake8 \
            src/data_collection_preprocessing \
            tests/test_data_collection_preprocessing \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  python-build:
    name: Python Build
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BUILD_VERSION }}

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  python-test:
    name: Python Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: python-build
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Download Python dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Install test dependencies and built wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov python-dotenv
          python -m pip install --no-deps dist/*.whl

      - name: Run pytest
        env:
          AIHUB_API_KEY: ${{ secrets.AIHUB_API_KEY }}
          API_KEY: ${{ secrets.GOVON_API_KEY }}
          BM25_INDEX_HMAC_KEY: ${{ secrets.BM25_INDEX_HMAC_KEY }}
        run: pytest tests/test_data_collection_preprocessing -q

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: detect-projects
    if: ${{ needs.detect-projects.outputs.has_frontend == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}
          cache: npm
          cache-dependency-path: GovOn/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: GovOn/frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: GovOn/frontend
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs:
      - detect-projects
      - frontend-lint
    if: ${{ needs.detect-projects.outputs.has_frontend == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_BUILD_VERSION }}
          cache: npm
          cache-dependency-path: GovOn/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: GovOn/frontend
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static export
        working-directory: GovOn/frontend
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

      - name: Upload frontend static artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static-export
          path: GovOn/frontend/out
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: GovOn/frontend/out

  frontend-smoke:
    name: Frontend Smoke Test
    runs-on: ubuntu-latest
    needs:
      - detect-projects
      - frontend-build
    if: ${{ needs.detect-projects.outputs.has_frontend == 'true' }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-static-export
          path: frontend-static

      - name: Verify exported site
        run: |
          test -f frontend-static/index.html
          test -f frontend-static/main/index.html
          grep -q "GovOn" frontend-static/index.html

  deploy-pages:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - detect-projects
      - python-test
      - frontend-build
      - frontend-smoke
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-projects.outputs.has_frontend == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Python dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Confirm deployment payload
        run: ls -la dist

      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
