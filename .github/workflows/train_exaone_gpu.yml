name: "Train EXAONE-Deep-7.8B on GPU"

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: true
        default: '1'
      batch_size:
        description: 'Per device train batch size'
        required: true
        default: '2'
      push_to_hub:
        description: 'Push final model to HF Hub'
        type: boolean
        default: true
      hub_model_id:
        description: 'HF Model ID (e.g., username/repo-name)'
        required: false
        default: 'GovOn/EXAONE-Deep-7.8B-Gov-v1'

jobs:
  train:
    # GitHub에서 제공하는 T4 GPU 러너 레이블을 사용합니다.
    runs-on: ubuntu-22.04-gpu-t4
    
    env:
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_ENABLE_HF_TRANSFER: 1
      # T4 16GB 메모리 파편화 방지 설정
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install Dependencies
        run: |
          # T4 최적화 CUDA 라이브러리 및 학습 의존성 설치
          uv pip install --system torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121
          uv pip install --system bitsandbytes accelerate peft trl transformers datasets wandb requests loguru

      - name: Prepare Integrated Dataset (Civil + Public Doc)
        run: |
          mkdir -p data/final
          
          # 1. 행안부 공문서 데이터 수집 (샘플 수 상향 및 안정화)
          python3 scripts/collect_data/collect_public_docs.py --limit 3000 --output data/raw/public_docs.jsonl
          
          # 2. 기존 민원 데이터 로드 및 병합 (T4 환경 고려하여 5만 건 샘플링)
          TRAIN_CIVIL="data/processed/civil_complaint_train.jsonl"
          
          python3 -c "
          import json, random, os
          combined = []
          # 공문서 데이터 로드
          try:
              with open('data/raw/public_docs.jsonl', 'r') as f:
                  combined.extend([json.loads(line) for line in f])
          except Exception as e:
              print(f'Error loading public docs: {e}')
          
          # 기존 민원 데이터 로드 (파일이 존재할 경우만)
          if os.path.exists('$TRAIN_CIVIL'):
              with open('$TRAIN_CIVIL', 'r') as f:
                  civil_data = [json.loads(line) for line in f]
                  # T4 학습 시간 단축을 위해 고품질 민원 2만 건 샘플링
                  combined.extend(random.sample(civil_data, min(len(civil_data), 20000)))
          else:
              print('Warning: Civil complaint data not found.')
          
          random.shuffle(combined)
          
          # 최종 분할 저장
          split = int(len(combined) * 0.9)
          with open('data/final/train.jsonl', 'w') as f:
              for item in combined[:split]: f.write(json.dumps(item, ensure_ascii=False) + '\n')
          with open('data/final/val.jsonl', 'w') as f:
              for item in combined[split:]: f.write(json.dumps(item, ensure_ascii=False) + '\n')
          
          print(f'Final integrated records for T4: {len(combined)}')
          "

      - name: Fine-tuning EXAONE-Deep-7.8B (QLoRA for T4)
        run: |
          python3 src/training/train_qlora.py \
            --model_id "LGAI-EXAONE/EXAONE-Deep-7.8B" \
            --train_path "data/final/train.jsonl" \
            --val_path "data/final/val.jsonl" \
            --output_dir "./models/checkpoints/exaone-gov-v2" \
            --epochs 1 \
            --batch_size 1 \
            --grad_accum 32 \
            --max_seq_length 1024 \
            ${{ github.event.inputs.push_to_hub == 'true' && '--push_to_hub' || '' }} \
            --hub_model_id "${{ github.event.inputs.hub_model_id }}" \
            --hf_token "${{ env.HF_TOKEN }}"

      - name: Upload Logs to W&B
        if: always()
        run: |
          wandb sync --clean
