name: Reusable Python CI

on:
  workflow_call:
    inputs:
      build-python-version:
        required: false
        type: string
        default: "3.12"
      dependency-file:
        required: false
        type: string
        default: requirements-ci.txt
      matrix-os:
        required: false
        type: string
        default: '["ubuntu-latest","macos-latest","windows-latest"]'
      matrix-python-versions:
        required: false
        type: string
        default: '["3.10","3.11","3.12"]'
      pytest-command:
        required: false
        type: string
        default: pytest tests/test_data_collection_preprocessing -q

permissions:
  contents: read

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python lint environment
        uses: ./.github/actions/setup-python-ci
        with:
          dependency-file: ${{ inputs.dependency-file }}
          python-version: ${{ inputs.build-python-version }}

      - name: Run Black
        shell: bash
        run: |
          black --check \
            --target-version py310 \
            --target-version py311 \
            --target-version py312 \
            src/data_collection_preprocessing \
            tests/test_data_collection_preprocessing

      - name: Run isort
        shell: bash
        run: isort --check-only src/data_collection_preprocessing tests/test_data_collection_preprocessing

  python-build:
    name: Python Build
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python build environment
        uses: ./.github/actions/setup-python-ci
        with:
          dependency-file: ${{ inputs.dependency-file }}
          extra-packages: build
          python-version: ${{ inputs.build-python-version }}

      - name: Build package artifacts
        shell: bash
        run: python -m build

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  python-test:
    name: Python Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: python-build
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.matrix-os) }}
        python-version: ${{ fromJSON(inputs.matrix-python-versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python test environment
        uses: ./.github/actions/setup-python-ci
        with:
          dependency-file: ${{ inputs.dependency-file }}
          python-version: ${{ matrix.python-version }}

      - name: Download Python dist artifact
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Install built package
        shell: bash
        run: python -m pip install --no-deps dist/*.whl

      - name: Run pytest
        env:
          AIHUB_API_KEY: ${{ secrets.AIHUB_API_KEY }}
          API_KEY: ${{ secrets.GOVON_API_KEY }}
          BM25_INDEX_HMAC_KEY: ${{ secrets.BM25_INDEX_HMAC_KEY }}
        shell: bash
        run: ${{ inputs.pytest-command }}
