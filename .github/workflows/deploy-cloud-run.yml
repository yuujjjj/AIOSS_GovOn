name: Deploy Demo Runtime to Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICE_NAME: govon-api
  GCP_PROJECT_ID: govon-org
  GCP_REGION: asia-northeast3
  AR_REPOSITORY: govon-repo
  GHCR_IMAGE: ghcr.io/govon-org/govon
  DEPLOY_RUNTIME_ENV_VARS: SERVING_PROFILE=container,SKIP_MODEL_LOAD=true

permissions:
  contents: read
  id-token: write
  issues: write
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: demo-cloud-run
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      revision: ${{ steps.deploy.outputs.revision }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - name: Check GCP credentials
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GCP_SA_KEY 시크릿이 설정되지 않았습니다. 배포를 중단합니다."
            exit 1
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Determine image tags
        id: image
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          GCP_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/govon-api:${TAG}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${{ env.GHCR_IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "gcp_image=$GCP_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable Google Cloud APIs
        run: |
          gcloud services enable run.googleapis.com \
            artifactregistry.googleapis.com \
            iam.googleapis.com \
            compute.googleapis.com \
            cloudresourcemanager.googleapis.com \
            serviceusage.googleapis.com \
            --quiet

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Push image to Artifact Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ steps.image.outputs.ghcr_image }}
          docker tag ${{ steps.image.outputs.ghcr_image }} ${{ steps.image.outputs.gcp_image }}
          docker push ${{ steps.image.outputs.gcp_image }}

      - name: Deploy demo runtime to Cloud Run
        id: deploy
        run: |
          echo "Deploying demo runtime from Artifact Registry: ${{ steps.image.outputs.gcp_image }}"
          echo "This lane is intended for manual demo verification, not merge gating."

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.image.outputs.gcp_image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --port=8000 \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300 \
            --concurrency=80 \
            --set-env-vars="${{ env.DEPLOY_RUNTIME_ENV_VARS }}" \
            --allow-unauthenticated \
            --format='value(status.url)'

          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          REVISION=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --limit=1 2>/dev/null || echo "unknown")

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        id: check
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEALTHY=false
          for _ in $(seq 1 10); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep 15
          done

          echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"

  rollback:
    needs: [deploy, health-check]
    runs-on: ubuntu-latest
    if: needs.health-check.outputs.healthy == 'false'
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Rollback to previous revision
        run: |
          REVISION_COUNT=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' 2>/dev/null | wc -l | tr -d ' ')

          if [ "$REVISION_COUNT" -lt 2 ]; then
            echo "::warning::이전 revision이 없어 rollback을 건너뜁니다."
            exit 0
          fi

          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --limit=2 2>/dev/null | tail -1)

          if [ -n "$PREVIOUS" ]; then
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --to-revisions ${PREVIOUS}=100
          fi
