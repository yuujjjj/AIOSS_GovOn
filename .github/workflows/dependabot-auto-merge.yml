name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve PR (CODEOWNER)
        if: steps.metadata.outputs.package-ecosystem == 'github_actions' || steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "Dependabot 자동 승인 (CODEOWNER)" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge (GitHub Actions — all versions)
        if: steps.metadata.outputs.package-ecosystem == 'github_actions'
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto --merge \
            --repo "${{ github.repository }}"

          echo "### Dependabot Auto-Merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ steps.metadata.outputs.dependency-names }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Type | ${{ steps.metadata.outputs.update-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | ${{ steps.metadata.outputs.previous-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.metadata.outputs.new-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-merge | ✅ Enabled (GitHub Actions) |" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge (pip/docker — minor and patch only)
        if: steps.metadata.outputs.package-ecosystem != 'github_actions' && steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto --merge \
            --repo "${{ github.repository }}"

          echo "### Dependabot Auto-Merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ steps.metadata.outputs.dependency-names }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Type | ${{ steps.metadata.outputs.update-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | ${{ steps.metadata.outputs.previous-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.metadata.outputs.new-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-merge | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip major updates (pip/docker only)
        if: steps.metadata.outputs.package-ecosystem != 'github_actions' && steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "### Dependabot Auto-Merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Major version update detected for **${{ steps.metadata.outputs.dependency-names }}**." >> $GITHUB_STEP_SUMMARY
          echo "Manual review required." >> $GITHUB_STEP_SUMMARY
