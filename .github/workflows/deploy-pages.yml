name: Deploy Portal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-revision-date plugin needs full history
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install MkDocs dependencies
        run: pip install -r site/requirements-docs.txt
      - name: Build MkDocs site
        run: cd site && mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
