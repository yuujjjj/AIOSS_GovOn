# E2E Test Workflow for GovOn
#
# R1 기준 GovOn은 shell-first agentic runtime이 핵심이므로,
# 이 워크플로는 브라우저 UI보다 runtime contract를 우선 검증한다.
# 현재는 Playwright request fixture를 사용해 runtime smoke/contract를 확인하고,
# 향후 shell/agent endpoint가 추가되면 동일 스위트에서 확장한다.

name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'src/inference/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Python 환경 설정 (uv)
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.10'
          extras: '--extra dev'

      - name: E2E 테스트용 경량 런타임 의존성 설치
        run: |
          uv pip install --python .venv/bin/python \
            'fastapi>=0.100.0' \
            'uvicorn>=0.23.0' \
            'rank-bm25>=0.2.2' \
            'faiss-cpu>=1.7.4' \
            'sentence-transformers>=3.0.0'

      - name: Node.js 환경 설정
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Node.js 의존성 설치
        run: npm ci

      - name: Runtime contract E2E 실행
        env:
          API_KEY: dev-e2e-key
          CI: true
          GOVON_API_KEY: dev-e2e-key
          GOVON_RUNTIME_BASE_URL: http://127.0.0.1:8000
          SERVING_PROFILE: local
          SKIP_MODEL_LOAD: "true"
        run: |
          set -euo pipefail

          mkdir -p test-results playwright-report

          .venv/bin/python -m uvicorn src.inference.api_server:app \
            --host 127.0.0.1 \
            --port 8000 \
            > test-results/runtime-server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "서버 준비 완료"
              break
            fi
            echo "서버 시작 대기 중... ($i/30)"
            sleep 1
          done

          if ! curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
            echo "ERROR: FastAPI 서버가 30초 내에 시작되지 않았습니다"
            cat test-results/runtime-server.log
            exit 1
          fi

          npx playwright test

      - name: 테스트 결과 아티팩트 업로드
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
