# E2E Test Workflow for GovOn
#
# Playwright 기반 E2E 테스트를 실행하고 실패 시 스크린샷 아티팩트를 저장한다.
# 현재: FastAPI API 엔드포인트 + Swagger UI 테스트
# 향후: 프론트엔드 개발 시 브라우저 기반 UI 테스트로 확장

name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'src/inference/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Python 환경 설정 (uv)
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.10'

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node.js 의존성 설치
        run: npm install

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: FastAPI 서버 시작 (테스트 모드)
        run: |
          SKIP_MODEL_LOAD=true \
          uvicorn src.inference.api_server:app \
            --host 0.0.0.0 \
            --port 8000 &

          # 서버 준비 대기 (최대 30초)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "서버 준비 완료"
              break
            fi
            echo "서버 시작 대기 중... ($i/30)"
            sleep 1
          done

      - name: E2E 테스트 실행
        run: npx playwright test
        env:
          CI: true

      - name: 테스트 결과 아티팩트 업로드 (실패 시 스크린샷 포함)
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
