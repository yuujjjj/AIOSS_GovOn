# Selective Deployment Pipeline
#
# 변경된 파일 경로를 감지하여 관련 작업만 선택적으로 실행한다.
# dorny/paths-filter 를 사용해 능동적 경로 감지를 수행하며,
# paths-ignore 방식보다 세밀한 조건 분기를 제공한다.

name: Selective Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: selective-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # 0. 변경 경로 감지
  # ──────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.dockerignore'
            workflows:
              - '.github/**'
            tests:
              - 'tests/**'
            docs:
              - 'docs/**'
              - '**.md'

      - name: Change Detection Summary
        run: |
          echo "### Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| src | \`${{ steps.filter.outputs.src }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| docker | \`${{ steps.filter.outputs.docker }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| workflows | \`${{ steps.filter.outputs.workflows }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| tests | \`${{ steps.filter.outputs.tests }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| docs | \`${{ steps.filter.outputs.docs }}\` |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 1. 테스트 및 빌드 (src / tests / workflows 변경 시)
  # ──────────────────────────────────────────────
  test-and-build:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true' ||
      needs.detect-changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Report trigger reason
        run: |
          echo "### test-and-build (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect-changes.outputs.src }}" = "true" ]; then
            echo "- \`src/\` changes" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.detect-changes.outputs.tests }}" = "true" ]; then
            echo "- \`tests/\` changes" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.detect-changes.outputs.workflows }}" = "true" ]; then
            echo "- \`.github/\` workflow changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Lint
        run: |
          uv run black --check . || true
          uv run isort --check . || true
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,.git,__pycache__,build,dist || true

      - name: Run PR-Safe Inference Suite
        run: bash .github/scripts/run_inference_ci.sh 80

      - name: Build package
        run: uv build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-package-py${{ matrix.python-version }}
          path: dist/
          retention-days: 14

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: ./coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # 2. 앱 배포 (src 변경 + main push 시)
  # ──────────────────────────────────────────────
  deploy-app:
    needs: [detect-changes, test-and-build]
    if: >-
      needs.detect-changes.outputs.src == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package-py3.10
          path: dist/

      - name: Report trigger reason
        run: |
          echo "### deploy-app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`src/\` changes on push to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify artifact
        run: |
          echo "Downloaded artifacts:"
          ls -lh dist/

      - name: Deploy (placeholder)
        run: |
          echo "=== Deploying to production ==="
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Artifacts:"
          ls -lh dist/
          echo ""
          echo "Production deployment placeholder complete."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployment placeholder executed successfully." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 3. Docker 이미지 빌드 (docker / src 변경 + main push 시)
  # ──────────────────────────────────────────────
  build-docker:
    needs: detect-changes
    if: >-
      (needs.detect-changes.outputs.docker == 'true' ||
       needs.detect-changes.outputs.src == 'true') &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Report trigger reason
        run: |
          echo "### build-docker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect-changes.outputs.docker }}" = "true" ]; then
            echo "- Docker file changes (Dockerfile, docker-compose, .dockerignore)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.detect-changes.outputs.src }}" = "true" ]; then
            echo "- \`src/\` changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: |
          docker build \
            --tag govon:${{ github.sha }} \
            --tag govon:latest \
            --file Dockerfile \
            .
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker image built:** \`govon:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 4. 보안 스캔 (src / workflows 변경 시)
  # ──────────────────────────────────────────────
  security-scan:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Report trigger reason
        run: |
          echo "### security-scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.detect-changes.outputs.src }}" = "true" ]; then
            echo "- \`src/\` changes" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.detect-changes.outputs.workflows }}" = "true" ]; then
            echo "- \`.github/\` workflow changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install security tools
        run: pip install bandit

      - name: Run Bandit (Static Analysis)
        run: bandit -r src -lll -x tests

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Dependency Audit
        continue-on-error: true
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements-lock.txt 2>/dev/null || true
          if [ -f /tmp/requirements-lock.txt ]; then
            pip install pip-audit
            pip-audit -r /tmp/requirements-lock.txt
          elif [ -f requirements.txt ]; then
            pip install pip-audit
            pip-audit -r requirements.txt
          else
            echo "No dependency file found, skipping audit."
          fi

  # ──────────────────────────────────────────────
  # 5. 문서 전용 변경 알림 (docs만 변경된 경우)
  # ──────────────────────────────────────────────
  docs-only:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.docs == 'true' &&
      needs.detect-changes.outputs.src == 'false' &&
      needs.detect-changes.outputs.tests == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Documentation-only summary
        run: |
          echo "### docs-only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Documentation-only changes detected. Skipping build/test/deploy." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`docs/\` or \`**.md\` changes" >> $GITHUB_STEP_SUMMARY
