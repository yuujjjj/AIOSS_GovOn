name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Black (format check)
        continue-on-error: true
        run: uv run black --check .

      - name: isort (import order check)
        continue-on-error: true
        run: uv run isort --check .

      - name: Flake8 (syntax errors only)
        continue-on-error: true
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,.git,__pycache__,build,dist

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run Unit Tests (Shift-Left)
        run: |
          export SKIP_MODEL_LOAD=true
          uv run pytest \
            tests/test_inference/test_api_logic.py \
            tests/test_inference/test_shift_left.py \
            tests/test_inference/test_feature_flags.py \
            tests/test_inference/test_schemas.py \
            tests/test_inference/test_agent_manager.py \
            tests/test_inference/test_db_converters.py \
            tests/test_inference/test_db_crud.py \
            tests/test_inference/test_db_models.py \
            -o "addopts=" \
            --cov=src/inference \
            --cov-branch \
            --cov-fail-under=30 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Test Summary
        if: always()
        run: echo "### Test Results" >> $GITHUB_STEP_SUMMARY
