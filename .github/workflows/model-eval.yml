name: Model Evaluation (GitHub GPU)

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: 'Path or ID of the model to evaluate'
        required: true
        default: 'models/exaone-merged-v2'
      test_data:
        description: 'Path to the test dataset'
        required: true
        default: 'data/processed/v2_test.jsonl'
      max_samples:
        description: 'Maximum number of samples to evaluate'
        required: false
        default: '100'

  # pull_request:
  #   branches: [ main ]
  #   paths:
  #     - 'src/training/**'
  #     - 'src/evaluation/**'
  #     - 'data/processed/v2_*.jsonl'

concurrency:
  group: model-eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    name: v2 Model Performance Test
    runs-on: ubuntu-22.04-gpu-t4
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          uv pip install --system .
          uv pip install --system torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121
          uv pip install --system autoawq vllm

      - name: Run Evaluation
        run: |
          python3 -m src.evaluation.evaluate_model \
            --model_path ${{ github.event.inputs.model_path || 'models/exaone-merged-v2' }} \
            --test_data ${{ github.event.inputs.test_data || 'data/processed/v2_test.jsonl' }} \
            --max_samples ${{ github.event.inputs.max_samples || '100' }}
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
