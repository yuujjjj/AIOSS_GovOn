name: Security Scan

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Install security tools
        run: uv run pip install bandit pip-audit

      - name: Run Bandit (Static Analysis)
        # 초기 단계이므로 High 수준의 보안 이슈만 체크하여 안정성 확보
        run: |
          uv run bandit -r src -lll -x tests

      - name: Run Dependency Audit
        continue-on-error: true
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements-lock.txt 2>/dev/null || true
          if [ -f /tmp/requirements-lock.txt ]; then
            uv run pip-audit -r /tmp/requirements-lock.txt
          elif [ -f requirements.txt ]; then
            uv run pip-audit -r requirements.txt
          else
            echo "No dependency file found, skipping audit."
          fi

      - name: Run Bandit with SARIF output
        continue-on-error: true
        run: |
          uv run bandit -r src -lll -x tests -f sarif -o bandit-results.sarif 2>/dev/null || true

      - name: Upload Bandit SARIF to Code Scanning
        if: always() && hashFiles('bandit-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run pip-audit with JSON output
        id: audit
        continue-on-error: true
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements-lock.txt 2>/dev/null || true
          AUDIT_EXIT=0
          if [ -f /tmp/requirements-lock.txt ]; then
            uv run pip-audit -r /tmp/requirements-lock.txt -f json -o audit-results.json 2>/dev/null || AUDIT_EXIT=$?
          elif [ -f requirements.txt ]; then
            uv run pip-audit -r requirements.txt -f json -o audit-results.json 2>/dev/null || AUDIT_EXIT=$?
          fi
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

          # Generate summary
          if [ -f audit-results.json ]; then
            VULN_COUNT=$(python3 -c "import json; data=json.load(open('audit-results.json')); print(len([d for d in data.get('dependencies', []) if d.get('vulns', [])]))" 2>/dev/null || echo "0")
            echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "vuln_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-results.sarif
            audit-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Create Issue on vulnerability detection
        if: always() && steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vulnCount = '${{ steps.audit.outputs.vuln_count }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Check for existing open issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
            });

            const title = `🔒 보안 취약점 감지: ${vulnCount}건 (${new Date().toISOString().split('T')[0]})`;

            let body = `## 자동 보안 스캔 결과\n\n`;
            body += `| 항목 | 값 |\n|------|----|\n`;
            body += `| 감지된 취약점 | ${vulnCount}건 |\n`;
            body += `| 스캔 일시 | ${new Date().toISOString()} |\n`;
            body += `| Actions Run | [링크](${runUrl}) |\n\n`;
            body += `### 조치 필요\n`;
            body += `1. Actions Run 링크에서 상세 결과 확인\n`;
            body += `2. \`audit-results.json\` 아티팩트 다운로드하여 취약점 목록 검토\n`;
            body += `3. 취약한 패키지 업데이트 후 이 이슈 종료\n`;

            // Close existing issues before creating new one
            for (const issue of existingIssues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated'],
            });

      - name: Security Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 보안 스캔 결과 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (정적 분석) | ✅ 완료 |" >> $GITHUB_STEP_SUMMARY
          echo "| SARIF 업로드 | ✅ Code Scanning |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit (의존성) | 취약점 ${{ steps.audit.outputs.vuln_count }}건 |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.audit.outputs.vuln_count }}" != "0" ]; then
            echo "| 자동 이슈 생성 | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 자동 이슈 생성 | ⏭️ (취약점 없음) |" >> $GITHUB_STEP_SUMMARY
          fi
