name: Security Scan

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          pip install bandit

      - name: Run Bandit (Static Analysis)
        # 초기 단계이므로 High 수준의 보안 이슈만 체크하여 안정성 확보
        run: |
          bandit -r src -lll -x tests

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Dependency Audit
        continue-on-error: true
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements-lock.txt 2>/dev/null || true
          if [ -f /tmp/requirements-lock.txt ]; then
            pip install pip-audit
            pip-audit -r /tmp/requirements-lock.txt
          elif [ -f requirements.txt ]; then
            pip install pip-audit
            pip-audit -r requirements.txt
          else
            echo "No dependency file found, skipping audit."
          fi
