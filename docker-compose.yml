services:
  govon-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: govon-backend:latest
    container_name: govon-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./agents:/app/agents
      - ./configs:/app/configs
    environment:
      - API_KEY=${API_KEY}
      - MODEL_PATH=${MODEL_PATH:-umyunsang/GovOn-EXAONE-LoRA-v2}
      - GPU_UTILIZATION=0.8
      - MAX_MODEL_LEN=8192
      - USE_RAG_PIPELINE=${USE_RAG_PIPELINE:-true}
      - MODEL_VERSION=${MODEL_VERSION:-v2_lora}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
